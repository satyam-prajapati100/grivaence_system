<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>
 <link rel="stylesheet" href="admin.css">
<link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body {
  margin: 0;
  font-family: Arial;
  display: flex;
  background: #f8fafc;
}

/* DARK MODE */
body.dark {
  background: #0f172a;
  color: #e2e8f0;
}

/* SIDEBAR */
.sidebar {
  width: 240px;
  height: 100vh;
  background: #1e293b;
  color: white;
  padding: 20px;
}

.sidebar h2 {
  margin-bottom: 30px;
}

.sidebar button {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border: none;
  background: transparent;
  color: white;
  text-align: left;
  cursor: pointer;
  border-radius: 8px;
}

.sidebar button:hover {
  background: #334155;
}

/* CONTENT */
.content {
  flex: 1;
  padding: 20px;
}

/* NAVBAR */
.navbar {
  display: flex;
  justify-content: space-between;
  background: white;
  padding: 15px;
  border-radius: 10px;
  align-items: center;
}

body.dark .navbar {
  background: #1e293b;
}

/* PROFILE */
.profile {
  position: relative;
}

.profile-box {
  position: absolute;
  top: 40px;
  right: 0;
  background:white;
  padding: 15px;
  border-radius: 20px;
  width: 170px;

  display: none; /* simple method */
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}
.profile-box.active {
  display: block;
}
body.dark .profile-box {
  background: #1e293b;
}

/* CARDS */
.cards {
  display: grid;
  grid-template-columns: repeat(4,1fr);
  gap: 15px;
  margin-top: 20px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

body.dark .card {
  background: #1e293b;
}

/* SECTIONS */
.section {
  display: none;
  margin-top: 20px;
}

.active {
  display: block;
}

/* TABLE */
table {
  width: 100%;
  border-collapse: collapse;
}

th, td {
  padding: 10px;
  border-bottom: 1px solid #ddd;
}

body.dark th, body.dark td {
  border-color: #374151;
}

/* BUTTON */
.btn {
  padding: 10px 15px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.primary { background: #4f46e5; color: white; }
.success { background: #059669; color: white; }
.danger { background: #dc2626; color: white; }

/* MAP */
#map {
  height: 400px;
  border-radius: 10px;
}
</style>
</head>

<body class="fade-in">

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>⚡ Admin</h2>

  <button onclick="showSection('dashboard')">📊 Dashboard</button>
  <button onclick="showSection('analyze')">🧠 Analyze</button>
  <button onclick="showSection('table')">📋 Complaints</button>
  <button onclick="showSection('graph')">📈 Graph</button>
  <button onclick="showSection('update')">✏️ Update</button>
  <button onclick="showSection('mapSection')">🗺 Map</button>
  <button onclick="showSection('profile')">👤 Profile</button>
</div>

<!-- CONTENT -->
<div class="content">

  <!-- NAVBAR -->
  <div class="navbar">
    <h3>Admin Dashboard</h3>

    <div>
      <span onclick="toggleTheme()">🌙</span>

  <div class="profile">
  <button id="profileBtn">👤</button>

  <div id="profileBox" class="profile-box">
    <p><b id="profileName">Test User</b></p>
    <p id="profileRole">User</p>
    <button class=" logbutton",onclick="logout()">Logout</button>
  </div>
</div>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard" class="section active">
    <div class="cards">
      <div class="card">Total Complaints<br><b>--</b></div>
      <div class="card">Pending<br><b>--</b></div>
      <div class="card">Resolved<br><b>--</b></div>
      <div class="card">High Priority<br><b>--</b></div>
    </div>
  </div>

  <!-- ANALYZE -->
  <div id="analyze" class="section">
    <h2>Analyze Complaints</h2>
    <button class="btn primary" onclick="loadComplaints()">Run Analysis</button>
  </div>

  <!-- TABLE -->
  <div id="table" class="section">
    <h2>Complaints</h2>
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Text</th>
          <th>Category</th>
          <th>Priority</th>
          <th>Sentiment</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

  <!-- GRAPH -->
  <div id="graph" class="section">
    <h2>Priority Graph</h2>
    <canvas id="chart"></canvas>
  </div>

  <!-- UPDATE -->
  <div id="update" class="section">
    <h2>Update Status</h2>

    <input id="cid" placeholder="Complaint ID">
    <select id="status">
      <option>Pending</option>
      <option>Resolved</option>
    </select>

    <button class="btn success" onclick="updateComplaint()">Update</button>
  </div>

  <!-- MAP -->
  <div id="mapSection" class="section">
    <h2>Complaints Map</h2>
    <div id="map"></div>
  </div>

  <!-- PROFILE -->
  <div id="profile" class="section">
    <h2>Profile</h2>
    <p>Name: <span id="profileName"></span></p>
    <p>Role: <span id="profileRole"></span></p>
    <button class="btn danger" onclick="logout()">Logout</button>
  </div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>


<script>

</script>
<script src="main.js"></script>
</body>
</html>
